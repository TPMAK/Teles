<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aden's Tutor">
<meta name="theme-color" content="#1a8a6e">
<title>Aden's Tutor</title>
<style>
  :root {
    --bg: #f5f0e8; --surface: #fffef9; --surface2: #f0ebe0; --border: #ddd6c8;
    --text: #2a2520; --text2: #6b6258; --text3: #9b9088;
    --teal: #1a8a6e; --teal-light: #e4f5ef; --teal-dim: #c8ece3;
    --amber: #b85c0a; --amber-light: #fdf0e0;
    --purple: #5b3fa0; --purple-light: #f0ebff;
    --red: #c0392b; --red-light: #fdecea;
    --radius: 14px; --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(42,37,32,0.08);
    --shadow-lg: 0 8px 32px rgba(42,37,32,0.12);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1814; --surface: #242018; --surface2: #2e2a22; --border: #3d3830;
      --text: #f0ebe0; --text2: #a09688; --text3: #6b6258;
      --teal: #2ab894; --teal-light: #0f2e24; --teal-dim: #1a3d30;
      --amber: #e8853a; --amber-light: #2a1e0a;
      --purple: #9b7fe8; --purple-light: #1e1535;
      --red-light: #2a0f0f;
      --shadow: 0 2px 12px rgba(0,0,0,0.3); --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Georgia', serif; background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    padding-top: var(--safe-t);
    -webkit-text-size-adjust: 100%;
  }
  button { font-family: inherit; cursor: pointer; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
  input, textarea { font-family: inherit; outline: none; -webkit-appearance: none; border-radius: 0; }
  img { max-width: 100%; border-radius: var(--radius-sm); }
  .hidden { display: none !important; }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 300;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    padding-bottom: calc(24px + var(--safe-b));
  }
  .login-box {
    background: var(--surface); border-radius: var(--radius); padding: 36px 28px;
    max-width: 380px; width: 100%; box-shadow: var(--shadow-lg); text-align: center;
  }
  .login-owl { font-size: 48px; margin-bottom: 12px; display: block; }
  .login-box h1 { font-size: 22px; margin-bottom: 4px; }
  .login-sub { font-size: 14px; color: var(--text2); font-family: sans-serif; margin-bottom: 24px; }
  .login-who { display: flex; gap: 10px; margin-bottom: 20px; }
  .who-btn {
    flex: 1; padding: 14px 10px; border-radius: var(--radius-sm);
    border: 2px solid var(--border); background: var(--surface2);
    font-size: 14px; font-family: sans-serif; font-weight: 600; color: var(--text2); transition: all 0.15s;
  }
  .who-btn.selected { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
  .who-icon { font-size: 26px; display: block; margin-bottom: 4px; }
  .login-field { margin-bottom: 14px; text-align: left; }
  .login-field label { display: block; font-size: 11px; font-family: sans-serif; font-weight: 600; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .login-field input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); font-size: 16px; font-family: sans-serif; }
  .login-field input:focus { border-color: var(--teal); }
  .login-error { font-size: 13px; color: var(--red); font-family: sans-serif; margin-bottom: 10px; min-height: 18px; }
  .login-btn { width: 100%; padding: 15px; background: var(--teal); color: white; font-size: 16px; font-family: sans-serif; font-weight: 600; border-radius: var(--radius-sm); }

  /* APP */
  .app { display: flex; flex-direction: column; height: 100%; max-width: 880px; margin: 0 auto; width: 100%; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 10px;
  }
  .header-brand { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .header-icon { width: 34px; height: 34px; background: var(--teal); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--text3); font-family: sans-serif; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .header-tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: 8px; padding: 3px; }
  .tab-btn { font-size: 12px; font-family: sans-serif; padding: 5px 10px; border-radius: 6px; background: transparent; color: var(--text2); font-weight: 500; }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .logout-btn { font-size: 12px; font-family: sans-serif; padding: 6px 10px; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); color: var(--text3); }
  .role-badge { font-size: 10px; font-family: sans-serif; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .role-badge.parent { background: var(--purple-light); color: var(--purple); }
  .role-badge.student { background: var(--teal-light); color: var(--teal); }

  /* ACTION BAR */
  .action-bar { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center; }
  .new-session-btn { font-size: 13px; font-family: sans-serif; font-weight: 600; padding: 8px 18px; border-radius: 20px; background: var(--teal); color: white; transition: opacity 0.15s; }
  .new-session-btn:active { opacity: 0.8; }
  .new-session-btn:disabled { opacity: 0.4; }
  .session-label { font-size: 12px; font-family: sans-serif; color: var(--text3); margin-left: auto; }

  /* CHAT */
  #view-chat { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
  .msg { display: flex; gap: 8px; max-width: 100%; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--teal-light); align-self: flex-end; }
  .msg.user .msg-avatar { background: var(--amber-light); }
  .msg-bubble { max-width: 78%; padding: 11px 14px; border-radius: 16px; line-height: 1.65; font-size: 15px; background: var(--surface); border: 1px solid var(--border); }
  .msg.user .msg-bubble { background: var(--teal-dim); border-color: var(--teal); border-radius: 16px 16px 4px 16px; }
  .msg.tutor .msg-bubble { border-radius: 16px 16px 16px 4px; }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: var(--teal); }
  .msg-img { margin-top: 8px; max-width: 200px; border-radius: 8px; display: block; }
  .msg-time { font-size: 10px; color: var(--text3); font-family: sans-serif; margin-top: 3px; text-align: right; }
  .msg.tutor .msg-time { text-align: left; }
  .session-divider { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
  .session-divider-line { flex: 1; height: 1px; background: var(--border); }
  .session-divider-label { font-size: 11px; font-family: sans-serif; color: var(--text3); white-space: nowrap; }

  /* THINKING */
  .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .thinking span { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); opacity: 0.4; animation: blink 1.2s infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2;transform:scale(0.85)} 50%{opacity:1;transform:scale(1)} }

  /* INPUT */
  .input-area { padding: 12px 16px; padding-bottom: calc(12px + var(--safe-b)); background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .photo-preview-wrap { margin-bottom: 8px; position: relative; display: inline-block; }
  .photo-preview-wrap img { max-height: 80px; border-radius: 8px; display: block; }
  .photo-remove { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: var(--red); color: white; font-size: 13px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-box { flex: 1; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 22px; padding: 11px 16px; font-size: 16px; color: var(--text); resize: none; min-height: 44px; max-height: 110px; line-height: 1.4; }
  .input-box:focus { border-color: var(--teal); }
  .input-box::placeholder { color: var(--text3); }
  .btn-photo { width: 44px; height: 44px; border-radius: 50%; background: var(--surface2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text2); flex-shrink: 0; }
  .btn-photo svg { width: 20px; height: 20px; }
  .btn-send { height: 44px; padding: 0 18px; border-radius: 22px; background: var(--teal); color: white; font-size: 15px; font-family: sans-serif; font-weight: 600; flex-shrink: 0; }
  .btn-send:disabled { opacity: 0.4; }

  /* HISTORY */
  #view-history { flex: 1; overflow-y: auto; padding: 16px; display: none; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
  .history-header { display: flex; justify-content: space-between; align-items: center; }
  .history-header h2 { font-size: 17px; }
  .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .session-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .session-card-title { font-size: 14px; font-weight: 700; }
  .session-card-date { font-size: 11px; color: var(--text3); font-family: sans-serif; }
  .session-card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
  .badge { font-size: 11px; font-family: sans-serif; font-weight: 600; padding: 2px 9px; border-radius: 20px; background: var(--teal-light); color: var(--teal); }
  .badge.writing { background: var(--purple-light); color: var(--purple); }
  .badge.science { background: var(--amber-light); color: var(--amber); }
  .session-preview { font-size: 13px; color: var(--text2); line-height: 1.5; font-family: sans-serif; }
  .session-msg-count { font-size: 11px; color: var(--text3); font-family: sans-serif; margin-top: 6px; }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text2); }
  .empty-state .big { font-size: 44px; margin-bottom: 12px; }
  .empty-state p { font-family: sans-serif; font-size: 14px; line-height: 1.7; }

  /* SUMMARY */
  #view-summary { flex: 1; overflow-y: auto; padding: 16px; display: none; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .summary-card h3 { font-size: 14px; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .summary-card h3 .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat-box { flex: 1; min-width: 70px; background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
  .stat-box .val { font-size: 24px; font-weight: 700; color: var(--teal); }
  .stat-box .lbl { font-size: 11px; color: var(--text2); font-family: sans-serif; margin-top: 2px; }
  .progress-row { display: flex; flex-direction: column; gap: 10px; }
  .progress-item { display: flex; flex-direction: column; gap: 4px; }
  .progress-label { font-size: 13px; font-family: sans-serif; color: var(--text2); display: flex; justify-content: space-between; }
  .progress-bar-bg { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; background: var(--teal); transition: width 0.6s ease; }
  .flag-list { display: flex; flex-direction: column; gap: 8px; }
  .flag-item { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; font-family: sans-serif; line-height: 1.5; }
  .flag-icon { font-size: 15px; flex-shrink: 0; }
  .flag-text { color: var(--text2); }
  .generate-btn { background: var(--teal); color: white; font-size: 15px; font-family: sans-serif; font-weight: 600; padding: 14px 24px; border-radius: var(--radius-sm); width: 100%; }
  .loading-bar { height: 3px; background: var(--teal-light); border-radius: 2px; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: var(--teal); border-radius: 2px; animation: load 1.8s ease-in-out infinite; }
  @keyframes load { 0%{width:0;margin-left:0} 50%{width:80%;margin-left:10%} 100%{width:0;margin-left:100%} }

  /* OVERLAY */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .overlay-panel { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 880px; max-height: 85vh; display: flex; flex-direction: column; padding-bottom: var(--safe-b); }
  .overlay-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .overlay-title { font-size: 15px; font-weight: 700; }
  .overlay-close { font-size: 18px; background: var(--surface2); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text2); }
  .overlay-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <span class="login-owl">🦉</span>
    <h1>Aden's Tutor</h1>
    <p class="login-sub">Who are you?</p>
    <div class="login-who">
      <button class="who-btn selected" id="who-aden" onclick="selectWho('aden')">
        <span class="who-icon">🎒</span>Aden
      </button>
      <button class="who-btn" id="who-parent" onclick="selectWho('parent')">
        <span class="who-icon">👨‍👩‍👦</span>Parent
      </button>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pw" placeholder="Type your password..." onkeydown="if(event.key==='Enter') doLogin()" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">Let's go →</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="main-app" style="display:none">
  <header class="header">
    <div class="header-brand">
      <div class="header-icon">🦉</div>
      <div>
        <div class="header-title">Aden's Tutor</div>
        <div class="header-sub" id="session-status">Ready to learn</div>
      </div>
    </div>
    <div class="header-right">
      <span class="role-badge" id="role-badge"></span>
      <div class="header-tabs">
        <button class="tab-btn active" onclick="switchTab('chat')" id="tab-chat">Chat</button>
        <button class="tab-btn" onclick="switchTab('history')" id="tab-history">History</button>
        <button class="tab-btn hidden" onclick="switchTab('summary')" id="tab-summary">Summary</button>
      </div>
      <button class="logout-btn" onclick="logout()">Out</button>
    </div>
  </header>

  <div class="action-bar" id="action-bar">
    <button class="new-session-btn" id="new-session-btn" onclick="startNewSession(true)">✦ New session</button>
    <span class="session-label" id="session-count"></span>
  </div>

  <!-- CHAT -->
  <div id="view-chat">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="photo-preview-wrap hidden" id="photo-preview-wrap">
        <img id="photo-preview" src="" alt="">
        <div class="photo-remove" onclick="removePhoto()">✕</div>
      </div>
      <div class="input-row">
        <button class="btn-photo" onclick="document.getElementById('photo-input').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="8" width="18" height="13" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="12" cy="14" r="2.5"/>
          </svg>
        </button>
        <textarea class="input-box" id="msg-input" rows="1" placeholder="What are you working on?" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
  </div>

  <!-- HISTORY -->
  <div id="view-history">
    <div class="history-header">
      <h2>Past sessions</h2>
      <span id="history-count" style="font-size:12px;color:var(--text3);font-family:sans-serif;"></span>
    </div>
    <div id="session-list"></div>
  </div>

  <!-- SUMMARY -->
  <div id="view-summary">
    <div class="summary-card">
      <h3><span class="dot"></span>This week</h3>
      <div class="stat-row">
        <div class="stat-box"><div class="val" id="stat-sessions">0</div><div class="lbl">Sessions</div></div>
        <div class="stat-box"><div class="val" id="stat-messages">0</div><div class="lbl">Messages</div></div>
        <div class="stat-box"><div class="val" id="stat-subjects">0</div><div class="lbl">Subjects</div></div>
        <div class="stat-box"><div class="val" id="stat-photos">0</div><div class="lbl">Photos</div></div>
      </div>
      <div id="loading-bar-wrap" class="hidden">
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        <p style="font-size:12px;color:var(--text3);font-family:sans-serif;margin-top:8px;">Generating summary...</p>
      </div>
    </div>
    <div class="summary-card">
      <h3><span class="dot" style="background:var(--amber)"></span>Subject activity</h3>
      <div class="progress-row" id="subject-progress">
        <p style="font-size:13px;color:var(--text3);font-family:sans-serif;">Start some sessions to see activity here.</p>
      </div>
    </div>
    <div class="summary-card" id="ai-summary-card" style="display:none">
      <h3><span class="dot" style="background:var(--purple)"></span>AI summary</h3>
      <div id="ai-summary-text" style="font-size:14px;line-height:1.7;color:var(--text2);font-family:sans-serif;"></div>
    </div>
    <div class="summary-card">
      <h3><span class="dot" style="background:var(--red)"></span>Things to be aware of</h3>
      <div class="flag-list" id="flag-list">
        <div class="flag-item"><span class="flag-icon">ℹ️</span><span class="flag-text" style="font-family:sans-serif;">Generate a summary to see flags.</span></div>
      </div>
    </div>
    <button class="generate-btn" onclick="generateSummary()">✨ Generate weekly summary</button>
  </div>
</div>

<!-- SESSION OVERLAY -->
<div class="overlay hidden" id="session-overlay" onclick="closeOverlay(event)">
  <div class="overlay-panel">
    <div class="overlay-header">
      <div>
        <div class="overlay-title" id="overlay-title">Session</div>
        <div style="font-size:11px;color:var(--text3);font-family:sans-serif;margin-top:2px" id="overlay-meta"></div>
      </div>
      <button class="overlay-close" onclick="document.getElementById('session-overlay').classList.add('hidden')">✕</button>
    </div>
    <div class="overlay-messages" id="overlay-messages"></div>
  </div>
</div>

<script>
/* ══════ CONFIG ══════ */
const config = {
  webhook: 'https://stanmak.app.n8n.cloud/webhook/aden-tutor-chat',
  supabaseUrl: 'https://dsdmpqnuvggohwxqhgod.supabase.co',
  supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZG1wcW51dmdnb2h3eHFoZ29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDAzNDIsImV4cCI6MjA5MjA3NjM0Mn0.Tfq0RtndhsEwqxcoTyw2MOPS4bJjDv8ec4qobSOO8R0',
};

/* ══════ AUTH ══════ */
const PASSWORDS = { aden: 'aden', parent: 'dad123' };
let currentRole = null, selectedWho = 'aden';

function selectWho(who) {
  selectedWho = who;
  document.getElementById('who-aden').classList.toggle('selected', who === 'aden');
  document.getElementById('who-parent').classList.toggle('selected', who === 'parent');
  document.getElementById('login-pw').value = '';
  document.getElementById('login-error').textContent = '';
}
function doLogin() {
  const pw = document.getElementById('login-pw').value;
  if (pw === PASSWORDS[selectedWho]) {
    currentRole = selectedWho;
    document.getElementById('login-screen').style.display = 'none';
    initApp();
  } else {
    document.getElementById('login-error').textContent = 'Wrong password — try again.';
    document.getElementById('login-pw').value = '';
  }
}
function logout() {
  currentRole = null; sessionMessages = []; allSessions = [];
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').value = '';
  document.getElementById('login-error').textContent = '';
  selectWho('aden');
}

/* ══════ STATE ══════ */
let currentSubject = 'General';
let currentSessionId = null;
let sessionMessages = [];
let photoBase64 = null;
let allSessions = [];
let isSending = false;

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ══════ INIT ══════ */
function initApp() {
  document.getElementById('main-app').style.display = 'flex';
  applyRole();
  loadSessionsFromStorage();
  currentSessionId = generateId();
  sessionMessages = [];
  document.getElementById('messages').innerHTML = '';
  appendWelcomeMessage();
  updateSessionStatus();
}

function applyRole() {
  const isParent = currentRole === 'parent';
  const badge = document.getElementById('role-badge');
  badge.textContent = isParent ? 'Parent' : 'Aden';
  badge.className = 'role-badge ' + (isParent ? 'parent' : 'student');
  document.getElementById('tab-summary').classList.toggle('hidden', !isParent);
  if (isParent) {
    document.getElementById('msg-input').disabled = true;
    document.getElementById('msg-input').placeholder = 'Log in as Aden to chat.';
    document.getElementById('send-btn').disabled = true;
    document.querySelector('.btn-photo').disabled = true;
    document.getElementById('new-session-btn').disabled = true;
  }
}

/* ══════ TABS ══════ */
function switchTab(tab) {
  ['chat','history','summary'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  document.getElementById('view-chat').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('view-history').style.display = tab === 'history' ? 'flex' : 'none';
  document.getElementById('view-summary').style.display = tab === 'summary' ? 'flex' : 'none';
  document.getElementById('action-bar').style.display = tab === 'chat' ? 'flex' : 'none';
  if (tab === 'history') renderHistory();
  if (tab === 'summary') updateStats();
}

/* ══════ NEW SESSION — fixed ══════ */
function startNewSession(showDivider) {
  // Save what we have first
  saveCurrentSession();

  // Show a divider in the existing chat
  if (showDivider && sessionMessages.length > 0) {
    appendDivider();
  }

  // Reset state
  currentSessionId = generateId();
  sessionMessages = [];
  photoBase64 = null;
  removePhoto();
  updateSessionStatus();

  // Show fresh welcome message in the same chat
  appendWelcomeMessage();

  // Scroll to bottom
  const wrap = document.getElementById('messages');
  setTimeout(() => { wrap.scrollTop = wrap.scrollHeight; }, 50);
}

function appendWelcomeMessage() {
  const isParent = currentRole === 'parent';
  const msg = isParent
    ? `👋 Welcome to the parent view.<br><br>Browse Aden's sessions in <strong>History</strong>, and generate a weekly AI summary in <strong>Summary</strong>.`
    : `Hey Aden! 👋 Ready to work something out together? I won't give you the answer — but I'll help you think it through. That's how you get smarter! 💪<br><br>Type your question or snap a photo of your homework.`;
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg tutor';
  div.innerHTML = `<div class="msg-avatar">🦉</div><div><div class="msg-bubble"><p>${msg}</p></div><div class="msg-time">${formatTime(new Date())}</div></div>`;
  wrap.appendChild(div);
}

/* ══════ PHOTO ══════ */
function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoBase64 = ev.target.result;
    document.getElementById('photo-preview').src = photoBase64;
    document.getElementById('photo-preview-wrap').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function removePhoto() {
  photoBase64 = null;
  document.getElementById('photo-preview').src = '';
  document.getElementById('photo-preview-wrap').classList.add('hidden');
}

/* ══════ SEND ══════ */
async function sendMessage() {
  if (currentRole === 'parent' || isSending) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !photoBase64) return;

  isSending = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  input.style.height = '';

  const photoSnap = photoBase64;
  const userMsg = { role: 'user', text, photo: photoSnap, time: new Date().toISOString() };
  sessionMessages.push(userMsg);
  appendMessage('user', text, photoSnap);
  removePhoto();

  const thinkId = showThinking();

  try {
    const res = await fetch(config.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: currentSessionId,
        subject: currentSubject,
        message: text,
        photo: photoSnap || null,
        history: sessionMessages.slice(-10).map(m => ({ role: m.role, content: m.text })),
      }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const reply = data.reply || data.message || data.text || JSON.stringify(data);
    hideThinking(thinkId);
    const tutorMsg = { role: 'tutor', text: reply, time: new Date().toISOString() };
    sessionMessages.push(tutorMsg);
    appendMessage('tutor', reply);
    saveCurrentSession();
  } catch(err) {
    hideThinking(thinkId);
    appendMessage('tutor', "Hmm, I couldn't reach the server. Check your internet and try again! 🔧");
    console.error(err);
  }

  isSending = false;
  document.getElementById('send-btn').disabled = false;
  updateSessionStatus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = ''; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }

/* ══════ MESSAGES ══════ */
function appendMessage(role, text, photo) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'tutor' ? '🦉' : 'A';
  const bubbleHtml = `<p>${escapeHtml(text).replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</p>`
    + (photo ? `<img class="msg-img" src="${photo}" alt="Homework">` : '');
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div><div class="msg-bubble">${bubbleHtml}</div><div class="msg-time">${formatTime(new Date())}</div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}
function appendDivider() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'session-divider';
  div.innerHTML = `<div class="session-divider-line"></div><div class="session-divider-label">New session · ${formatTime(new Date())}</div><div class="session-divider-line"></div>`;
  wrap.appendChild(div);
}
let thinkCounter = 0;
function showThinking() {
  const id = 'think-' + (++thinkCounter);
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = id; div.className = 'msg tutor';
  div.innerHTML = `<div class="msg-avatar">🦉</div><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div); wrap.scrollTop = wrap.scrollHeight;
  return id;
}
function hideThinking(id) { const el = document.getElementById(id); if (el) el.remove(); }

/* ══════ STORAGE ══════ */
function saveCurrentSession() {
  if (sessionMessages.length < 2) return;
  const session = {
    id: currentSessionId, subject: currentSubject, date: new Date().toISOString(),
    messages: [...sessionMessages], photoCount: sessionMessages.filter(m => m.photo).length,
  };
  const idx = allSessions.findIndex(s => s.id === currentSessionId);
  if (idx >= 0) allSessions[idx] = session; else allSessions.unshift(session);
  localStorage.setItem('aden_sessions', JSON.stringify(allSessions));
  pushToSupabase(session);
}
function loadSessionsFromStorage() {
  try { allSessions = JSON.parse(localStorage.getItem('aden_sessions') || '[]'); } catch(e) { allSessions = []; }
}
async function pushToSupabase(session) {
  try {
    await fetch(`${config.supabaseUrl}/rest/v1/sessions`, {
      method: 'POST',
      headers: { 'apikey': config.supabaseKey, 'Authorization': `Bearer ${config.supabaseKey}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: session.id, subject: session.subject, date: session.date, messages: JSON.stringify(session.messages), photo_count: session.photoCount, message_count: session.messages.length })
    });
  } catch(e) { console.warn('Supabase sync failed:', e); }
}

/* ══════ HISTORY ══════ */
function renderHistory() {
  const list = document.getElementById('session-list');
  const count = document.getElementById('history-count');
  if (!allSessions.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">📚</div><p>No sessions yet.<br>Start chatting and they'll appear here.</p></div>`;
    count.textContent = ''; return;
  }
  count.textContent = `${allSessions.length} session${allSessions.length !== 1 ? 's' : ''}`;
  list.innerHTML = allSessions.map(s => {
    const preview = s.messages.find(m => m.role === 'tutor');
    const pt = preview ? preview.text.slice(0,100) + (preview.text.length > 100 ? '…' : '') : '';
    const bc = s.subject === 'Writing' ? 'writing' : s.subject === 'Science' ? 'science' : '';
    return `<div class="session-card" onclick="openSession('${s.id}')">
      <div class="session-card-header"><span class="session-card-title">${escapeHtml(s.subject)} session</span><span class="session-card-date">${formatDate(s.date)}</span></div>
      <div class="session-card-meta"><span class="badge ${bc}">${s.subject}</span>${s.photoCount > 0 ? `<span style="font-size:11px;color:var(--text3);font-family:sans-serif;">📸 ${s.photoCount}</span>` : ''}</div>
      ${pt ? `<div class="session-preview">${escapeHtml(pt)}</div>` : ''}
      <div class="session-msg-count">${s.messages.length} messages</div>
    </div>`;
  }).join('');
}
function openSession(id) {
  const session = allSessions.find(s => s.id === id);
  if (!session) return;
  document.getElementById('overlay-title').textContent = `${session.subject} session`;
  document.getElementById('overlay-meta').textContent = `${formatDate(session.date)} · ${session.messages.length} messages`;
  document.getElementById('overlay-messages').innerHTML = session.messages.map(m => {
    const av = m.role === 'tutor' ? '🦉' : 'A';
    return `<div class="msg ${m.role}"><div class="msg-avatar">${av}</div><div><div class="msg-bubble"><p>${escapeHtml(m.text).replace(/\n/g,'<br>')}</p>${m.photo?`<img class="msg-img" src="${m.photo}" alt="">`:''}
    </div><div class="msg-time">${formatTime(new Date(m.time))}</div></div></div>`;
  }).join('');
  document.getElementById('session-overlay').classList.remove('hidden');
}
function closeOverlay(e) { if (e.target === document.getElementById('session-overlay')) document.getElementById('session-overlay').classList.add('hidden'); }

/* ══════ SUMMARY ══════ */
function updateStats() {
  const week = allSessions.filter(s => (Date.now() - new Date(s.date)) < 7*24*60*60*1000);
  document.getElementById('stat-sessions').textContent = week.length;
  document.getElementById('stat-messages').textContent = week.reduce((a,s) => a + s.messages.length, 0);
  document.getElementById('stat-subjects').textContent = [...new Set(week.map(s => s.subject))].length;
  document.getElementById('stat-photos').textContent = week.reduce((a,s) => a + (s.photoCount||0), 0);
  const sc = {}; week.forEach(s => { sc[s.subject] = (sc[s.subject]||0) + s.messages.length; });
  const mx = Math.max(...Object.values(sc), 1);
  const pe = document.getElementById('subject-progress');
  pe.innerHTML = !Object.keys(sc).length
    ? `<p style="font-size:13px;color:var(--text3);font-family:sans-serif;">Start some sessions first.</p>`
    : Object.entries(sc).map(([sub, c]) => `<div class="progress-item"><div class="progress-label"><span>${sub}</span><span>${c} messages</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(c/mx*100)}%"></div></div></div>`).join('');
}
async function generateSummary() {
  document.getElementById('loading-bar-wrap').classList.remove('hidden');
  const week = allSessions.filter(s => (Date.now() - new Date(s.date)) < 7*24*60*60*1000);
  try {
    const res = await fetch(config.webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'weekly_summary', sessions: week.map(s => ({ subject: s.subject, date: s.date, messageCount: s.messages.length, messages: s.messages.map(m => ({ role: m.role, content: m.text.slice(0,200) })) })) }) });
    const data = await res.json();
    const summary = data.summary || data.reply || data.text || 'Summary generated.';
    const flags = data.flags || [];
    document.getElementById('ai-summary-text').innerHTML = summary.replace(/\n/g,'<br>');
    document.getElementById('ai-summary-card').style.display = 'block';
    document.getElementById('flag-list').innerHTML = flags.length
      ? flags.map(f => `<div class="flag-item"><span class="flag-icon">${f.icon||'⚠️'}</span><span class="flag-text">${escapeHtml(f.text)}</span></div>`).join('')
      : `<div class="flag-item"><span class="flag-icon">✅</span><span class="flag-text" style="font-family:sans-serif;">No concerns this week. Aden is engaging well!</span></div>`;
  } catch(e) { alert('Could not generate summary.'); }
  document.getElementById('loading-bar-wrap').classList.add('hidden');
}

/* ══════ HELPERS ══════ */
function updateSessionStatus() {
  const c = sessionMessages.length;
  document.getElementById('session-status').textContent = c === 0 ? 'Ready to learn' : `${Math.ceil(c/2)} question${Math.ceil(c/2)!==1?'s':''} explored`;
  document.getElementById('session-count').textContent = c > 0 ? `${Math.ceil(c/2)} exchange${Math.ceil(c/2)!==1?'s':''}` : '';
}
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatTime(d) { return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function formatDate(iso) { return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }); }
</script>
